<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MediaVault</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar dashboard-nav">
        <div class="logo">
            <i class="fas fa-cloud"></i>
            <span>MediaVault</span>
        </div>
        <div class="nav-links">
            <span class="user-name" id="userName">Welcome, User</span>
            <button class="btn-logout" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i>
                Logout
            </button>
        </div>
    </nav>

    <!-- Dashboard Content -->
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="storage-info">
                <h3><i class="fas fa-hdd"></i> Storage</h3>
                <div class="storage-bar">
                    <div class="storage-used" id="storageBar"></div>
                </div>
                <p><span id="storageUsed">0 GB</span> of 1 TB used</p>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="active" data-filter="all">
                    <i class="fas fa-th"></i> All Files
                </a>
                <a href="#" data-filter="image">
                    <i class="fas fa-image"></i> Photos
                </a>
                <a href="#" data-filter="video">
                    <i class="fas fa-video"></i> Videos
                </a>
                <a href="#" data-filter="recent">
                    <i class="fas fa-clock"></i> Recent
                </a>
                <a href="#" data-filter="trash">
                    <i class="fas fa-trash"></i> Trash
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Upload Section -->
            <div class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <h3>Drag & Drop Files Here</h3>
                    <p>or click to browse</p>
                    <input type="file" id="fileInput" multiple accept="image/*,video/*" hidden>
                </div>

                <div class="upload-progress" id="uploadProgress" style="display: none;">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <p id="uploadStatus">Uploading...</p>
                </div>
            </div>

            <!-- Files Header -->
            <div class="files-header">
                <h2>Your Files</h2>
                <div class="view-options">
                    <button class="view-btn active" data-view="grid">
                        <i class="fas fa-th"></i>
                    </button>
                    <button class="view-btn" data-view="list">
                        <i class="fas fa-list"></i>
                    </button>
                </div>
            </div>

            <!-- Files Grid -->
            <div class="files-grid" id="filesGrid">
                <!-- Files will be loaded here dynamically -->
                <div class="empty-state" id="emptyState">
                    <i class="fas fa-folder-open"></i>
                    <h3>No files yet</h3>
                    <p>Upload your first photo or video!</p>
                </div>
            </div>
        </main>
    </div>

    <!-- File Preview Modal -->
    <div class="modal" id="previewModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">
                <i class="fas fa-times"></i>
            </button>
            <div class="modal-body" id="modalBody">
                <!-- Preview content will be loaded here -->
            </div>
            <div class="modal-footer">
                <button class="btn-download" id="downloadBtn">
                    <i class="fas fa-download"></i> Download
                </button>
                <button class="btn-delete" id="deleteBtn">
                    <i class="fas fa-trash"></i> Delete
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/upload.js"></script>
</body>
</html>
